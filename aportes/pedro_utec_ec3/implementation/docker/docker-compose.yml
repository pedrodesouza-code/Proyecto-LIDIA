services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lidia_ec3}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-CAMBIAR}
      POSTGRES_ETL_PASSWORD: ${POSTGRES_ETL_PASSWORD:-CAMBIAR}
      POSTGRES_DASHBOARD_PASSWORD: ${POSTGRES_DASHBOARD_PASSWORD:-CAMBIAR}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - lidia_pg_data:/var/lib/postgresql/data
      - ./init_roles.sh:/docker-entrypoint-initdb.d/00_users.sh:ro
      - ../sql/ddl/00_schemas.sql:/docker-entrypoint-initdb.d/01_schemas.sql:ro
      - ../sql/ddl/01_roles.sql:/docker-entrypoint-initdb.d/02_roles.sql:ro
      - ../sql/ddl/02_Schema.sql:/docker-entrypoint-initdb.d/03_schema.sql:ro
      - ../sql/ddl/03_indices.sql:/docker-entrypoint-initdb.d/04_indices.sql:ro
      - ../sql/ddl/04_vistas.sql:/docker-entrypoint-initdb.d/05_vistas.sql:ro
      - ../sql/ddl/06_postgis_firms_migracion.sql:/docker-entrypoint-initdb.d/06_postgis.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER:-postgres} -d ${POSTGRES_DB:-lidia_ec3}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-lidia_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-CAMBIAR}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-lidia_ec3}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - lidia_mongo_data:/data/db

  streamlit:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -q -r requirements-utec.txt && streamlit run dashboard/streamlit_app.py --server.address 0.0.0.0"
    volumes:
      - ..:/app:ro
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-lidia_ec3}
      POSTGRES_USER: lidia_dashboard_user
      POSTGRES_PASSWORD: ${POSTGRES_DASHBOARD_PASSWORD:-CAMBIAR}
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  lidia_pg_data:
  lidia_mongo_data:
