  <path d="M 330 170 L 520 360" class="line"/>
  <path d="M 330 360 L 520 360" class="line"/>
  <path d="M 330 560 L 520 360" class="line"/>

  <path d="M 330 170 L 520 570" class="line"/>
  <path d="M 330 360 L 520 570" class="line"/>
  <path d="M 330 560 L 520 570" class="line"/>

  <path d="M 330 170 L 520 750" class="line"/>
  <path d="M 330 360 L 520 750" class="line"/>
  <path d="M 330 560 L 520 750" class="line"/>

  <path d="M 330 760 L 980 400" class="line"/>
  <path d="M 330 560 L 980 400" class="line"/>
  <path d="M 330 360 L 980 400" class="line"/>
  <path d="M 330 170 L 980 400" class="line"/>

  <path d="M 820 180 L 980 625" class="line"/>
