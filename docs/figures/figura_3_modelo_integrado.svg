  <path d="M 820 570 L 980 625" class="line"/>
  <path d="M 820 750 L 980 625" class="line"/>
  <path d="M 1290 470 L 1290 570" class="line"/>

  <text x="750" y="860" text-anchor="middle" class="body">Fuente: elaboración propia.</text>
