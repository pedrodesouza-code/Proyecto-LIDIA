  <text x="930" y="520" text-anchor="middle" class="body">ejecuciones_etl</text>
  <text x="930" y="545" text-anchor="middle" class="body">alertas</text>
  <text x="930" y="570" text-anchor="middle" class="body">focos_snapshots</text>
  <text x="930" y="595" text-anchor="middle" class="body">JSON Schema y trazabilidad</text>

  <rect x="1180" y="240" width="270" height="150" class="app"/>
