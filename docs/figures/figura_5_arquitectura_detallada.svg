  <text x="520" y="445" text-anchor="middle" class="body">Controles de calidad</text>

  <rect x="380" y="540" width="280" height="120" class="stg"/>
  <text x="520" y="580" text-anchor="middle" class="label">Staging</text>
  <text x="520" y="610" text-anchor="middle" class="body">Parquet / lotes procesados</text>
  <text x="520" y="635" text-anchor="middle" class="body">Base para recarga y auditoría</text>

  <rect x="780" y="180" width="300" height="180" class="sql"/>
  <text x="930" y="220" text-anchor="middle" class="label">MySQL Data Warehouse</text>
  <text x="930" y="250" text-anchor="middle" class="body">Dimensiones conformadas</text>
  <text x="930" y="275" text-anchor="middle" class="body">Hechos por grano temporal</text>
