<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, Helvetica, sans-serif; fill: #1f2a36; }
      .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2a36; }
      .body { font: 400 14px Arial, Helvetica, sans-serif; fill: #314151; }
      .src { fill: #dbeafe; stroke: #335c81; stroke-width: 2; rx: 16; ry: 16; }
      .etl { fill: #fde68a; stroke: #a16207; stroke-width: 2; rx: 16; ry: 16; }
      .stg { fill: #e9d5ff; stroke: #6b21a8; stroke-width: 2; rx: 16; ry: 16; }
      .sql { fill: #dcfce7; stroke: #166534; stroke-width: 2; rx: 16; ry: 16; }
      .nosql { fill: #cffafe; stroke: #155e75; stroke-width: 2; rx: 16; ry: 16; }
      .app { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; rx: 16; ry: 16; }
      .ops { fill: #f3f4f6; stroke: #4b5563; stroke-width: 2; rx: 16; ry: 16; }
      .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="800" y="50" text-anchor="middle" class="title">Figura 5. Arquitectura detallada con flujo de datos y componentes</text>

  <rect x="50" y="110" width="220" height="70" class="src"/>
  <text x="160" y="153" text-anchor="middle" class="label">NASA FIRMS</text>

  <rect x="50" y="210" width="220" height="70" class="src"/>
  <text x="160" y="253" text-anchor="middle" class="label">Open-Meteo / ERA5-Land</text>

  <rect x="50" y="310" width="220" height="70" class="src"/>
  <text x="160" y="353" text-anchor="middle" class="label">CAMS / Copernicus</text>

  <rect x="50" y="410" width="220" height="70" class="src"/>
  <text x="160" y="453" text-anchor="middle" class="label">CHIRPS</text>

  <rect x="50" y="510" width="220" height="70" class="src"/>
  <text x="160" y="553" text-anchor="middle" class="label">MODIS / AppEEARS</text>

  <rect x="380" y="90" width="280" height="170" class="etl"/>
  <text x="520" y="130" text-anchor="middle" class="label">Extract</text>
  <text x="520" y="160" text-anchor="middle" class="body">Scripts Python por fuente</text>
  <text x="520" y="185" text-anchor="middle" class="body">APIs REST y descargas reproducibles</text>
  <text x="520" y="210" text-anchor="middle" class="body">Ventanas temporales CDC</text>

  <rect x="380" y="300" width="280" height="190" class="etl"/>
  <text x="520" y="340" text-anchor="middle" class="label">Transform</text>
  <text x="520" y="370" text-anchor="middle" class="body">Validación con Pydantic</text>
  <text x="520" y="395" text-anchor="middle" class="body">Normalización temporal y espacial</text>
