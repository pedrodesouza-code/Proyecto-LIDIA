  <text x="1315" y="310" text-anchor="middle" class="body">KPIs</text>
  <text x="1315" y="335" text-anchor="middle" class="body">Series temporales y mapas</text>
  <text x="1315" y="360" text-anchor="middle" class="body">Comparativos y trazabilidad</text>

  <rect x="1180" y="500" width="270" height="150" class="ops"/>
  <text x="1315" y="540" text-anchor="middle" class="label">Operación y control</text>
  <text x="1315" y="570" text-anchor="middle" class="body">CDC, idempotencia, logs</text>
  <text x="1315" y="595" text-anchor="middle" class="body">Testing y calidad de datos</text>
  <text x="1315" y="620" text-anchor="middle" class="body">Evidencia para seguimiento</text>

