<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b4a5a"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, Helvetica, sans-serif; fill: #1f2a36; }
      .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2a36; }
      .body { font: 400 15px Arial, Helvetica, sans-serif; fill: #314151; }
      .box-stroke { stroke: #3b4a5a; stroke-width: 2; rx: 18; ry: 18; }
      .src { fill: #dbeafe; }
      .etl { fill: #fde68a; }
      .dw  { fill: #dcfce7; }
      .nosql { fill: #cffafe; }
      .app { fill: #fee2e2; }
      .user { fill: #ede9fe; }
      .line { stroke: #3b4a5a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 10 8; }
    </style>
  </defs>

  <text x="700" y="50" text-anchor="middle" class="title">Figura 1. Relacion entre actores del sistema</text>

  <rect x="70" y="110" width="220" height="90" class="box-stroke src"/>
  <text x="180" y="145" text-anchor="middle" class="label">NASA FIRMS</text>
  <text x="180" y="172" text-anchor="middle" class="body">Focos activos satelitales</text>

  <rect x="70" y="230" width="220" height="90" class="box-stroke src"/>
  <text x="180" y="265" text-anchor="middle" class="label">Open-Meteo / ERA5-Land</text>
  <text x="180" y="292" text-anchor="middle" class="body">Meteorologia historica</text>

  <rect x="70" y="350" width="220" height="90" class="box-stroke src"/>
  <text x="180" y="385" text-anchor="middle" class="label">CAMS / Copernicus</text>
  <text x="180" y="412" text-anchor="middle" class="body">Calidad del aire</text>

  <rect x="70" y="470" width="220" height="90" class="box-stroke src"/>
  <text x="180" y="505" text-anchor="middle" class="label">CHIRPS</text>
  <text x="180" y="532" text-anchor="middle" class="body">Precipitacion raster</text>

  <rect x="70" y="590" width="220" height="90" class="box-stroke src"/>
  <text x="180" y="625" text-anchor="middle" class="label">MODIS / AppEEARS</text>
  <text x="180" y="652" text-anchor="middle" class="body">Cobertura vegetal anual</text>

  <rect x="420" y="250" width="260" height="290" class="box-stroke etl"/>
  <text x="550" y="290" text-anchor="middle" class="label">Pipeline ETL en Python</text>
  <text x="550" y="330" text-anchor="middle" class="body">Extraccion</text>
  <text x="550" y="360" text-anchor="middle" class="body">Validacion con Pydantic</text>
  <text x="550" y="390" text-anchor="middle" class="body">Armonizacion temporal</text>
  <text x="550" y="420" text-anchor="middle" class="body">Armonizacion espacial</text>
  <text x="550" y="450" text-anchor="middle" class="body">Carga incremental e idempotente</text>
  <text x="550" y="480" text-anchor="middle" class="body">Control CDC y metricas</text>

  <rect x="820" y="210" width="240" height="150" class="box-stroke dw"/>
  <text x="940" y="250" text-anchor="middle" class="label">MySQL</text>
  <text x="940" y="278" text-anchor="middle" class="body">Data Warehouse</text>
  <text x="940" y="306" text-anchor="middle" class="body">Hechos y dimensiones</text>
  <text x="940" y="334" text-anchor="middle" class="body">Consultas y KPIs</text>

  <rect x="820" y="430" width="240" height="150" class="box-stroke nosql"/>
  <text x="940" y="470" text-anchor="middle" class="label">MongoDB</text>
  <text x="940" y="498" text-anchor="middle" class="body">Trazabilidad documental</text>
  <text x="940" y="526" text-anchor="middle" class="body">Logs, snapshots, control CDC</text>
  <text x="940" y="554" text-anchor="middle" class="body">Calidad del pipeline</text>

  <rect x="1130" y="300" width="190" height="120" class="box-stroke app"/>
  <text x="1225" y="340" text-anchor="middle" class="label">Dashboard Streamlit</text>
  <text x="1225" y="368" text-anchor="middle" class="body">Visualizacion analitica</text>
  <text x="1225" y="396" text-anchor="middle" class="body">KPIs y comparativos</text>

  <rect x="1130" y="520" width="190" height="110" class="box-stroke user"/>
  <text x="1225" y="560" text-anchor="middle" class="label">Usuarios del sistema</text>
  <text x="1225" y="588" text-anchor="middle" class="body">Analistas e investigadores</text>

  <path d="M 290 155 L 420 320" class="line"/>
  <path d="M 290 275 L 420 350" class="line"/>
  <path d="M 290 395 L 420 410" class="line"/>
  <path d="M 290 515 L 420 470" class="line"/>
  <path d="M 290 635 L 420 500" class="line"/>

  <path d="M 680 330 L 820 285" class="line"/>
  <path d="M 680 460 L 820 505" class="line"/>

  <path d="M 1060 285 L 1130 340" class="line"/>
  <path d="M 1060 505 L 1130 575" class="line"/>

  <path d="M 1225 420 L 1225 520" class="line dash"/>

  <text x="700" y="760" text-anchor="middle" class="body">Fuente: Elaboracion propia.</text>
</svg>
